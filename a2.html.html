<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minas Navais</title>
    <style>
        html, body {
            height: 130%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #7a7a7a;
        }
        #camp {
            display: grid;
            grid-template-columns: repeat(10, 80px);
            grid-template-rows: repeat(10, 80px);
            gap: 2px;
            background: url('agua.png');
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        .celCamp {
            width: 80px;
            height: 80px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        input[type="button"] {
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div id="camp"></div>
    <div id="lives" style="display:flex;gap:8px;margin-top:12px; justify-content:center;">
        <img id="life1" src="corac.png" alt="vida" width="40" height="40">
        <img id="life2" src="corac.png" alt="vida" width="40" height="40">
        <img id="life3" src="corac.png" alt="vida" width="40" height="40">
        <img id="life4" src="corac.png" alt="vida" width="40" height="40">
        <img id="life5" src="corac.png" alt="vida" width="40" height="40">
    </div>

    <script>
const imagens = {
    oculta: 'fire.png',
    agua: 'nada.png',
    barcoVela: 'ship1.png',
    bote: 'ship2.png',
    lancha: 'ship3.png',
    bomba: 'bomba.png',
    coracao: 'corac.png',
    coracaoVazio: 'corvaz.png'
};

function embaralhar(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}
let elementosTabuleiro = [
    [4, 0, 1, 4, 0, 4, 3, 0, 4, 2],
    [0, 4, 2, 4, 1, 0, 3, 4, 0, 4],
    [3, 4, 4, 0, 0, 1, 4, 2, 0, 4],
    [4, 0, 2, 4, 0, 0, 4, 1, 4, 3],
    [0, 4, 4, 2, 1, 4, 0, 3, 0, 4],
    [4, 0, 3, 4, 0, 2, 0, 4, 0, 1],
    [2, 4, 0, 4, 0, 3, 4, 1, 0, 4],
    [0, 1, 4, 4, 2, 0, 3, 4, 0, 4],
    [4, 0, 3, 0, 4, 2, 0, 1, 4, 0],
    [0, 4, 4, 1, 4, 0, 0, 3, 2, 4]
];

const mapa = elementosTabuleiro.flat();
embaralhar(mapa);

const tabuleiro = document.querySelector('#camp');

function revelarCasa(celula, conteudo) {
    if (conteudo == 0) celula.style.backgroundImage = "url('" + imagens.agua + "')";
    else if (conteudo == 1) celula.style.backgroundImage = "url('" + imagens.barcoVela + "')";
    else if (conteudo == 2) celula.style.backgroundImage = "url('" + imagens.bote + "')";
    else if (conteudo == 3) celula.style.backgroundImage = "url('" + imagens.lancha + "')";
    else if (conteudo == 4) celula.style.backgroundImage = "url('" + imagens.bomba + "')";
}

function revelarVizinhos(indice) {
    const direcoes = [-10, 10, -1, 1];

    for (const direcao of direcoes) {
        const posicao = indice + direcao;

        if (posicao < 0 || posicao >= 100) continue;
        if (direcao == -1 && indice % 10 == 0) continue;
        if (direcao == 1 && indice % 10 == 9) continue;

        const celulaVizinha = tabuleiro.children[posicao];

        if (celulaVizinha) {
            revelarCasa(celulaVizinha, mapa[posicao]);
        }
    }
}

function ganharVida() {
    const vidas = Array.from(document.querySelectorAll('#lives img'));

    for (let i = 0; i < vidas.length; i++) {
        if (vidas[i].getAttribute('src') == imagens.coracaoVazio) {
            vidas[i].setAttribute('src', imagens.coracao);
            break;
        }
    }
}

for (let i = 0; i < 100; i++) {
    const celula = document.createElement('div');

    celula.classList.add('celCamp');
    celula.style.backgroundImage = "url('" + imagens.oculta + "')";

    const conteudo = mapa[i];

    celula.dataset.revelada = 'false';

    celula.addEventListener('click', () => {

        if (celula.dataset.revelada === 'true') return;

        celula.dataset.revelada = 'true';

        revelarCasa(celula, conteudo);

        if (conteudo >= 1 && conteudo <= 3) {
            ganharVida();
            revelarVizinhos(i);
        }

        if (conteudo == 4) {
            const vidas = Array.from(document.querySelectorAll('#lives img'));

            for (let j = vidas.length - 1; j >= 0; j--) {
                if (vidas[j].getAttribute('src') == imagens.coracao) {
                    vidas[j].setAttribute('src', imagens.coracaoVazio);
                    break;
                }
            }

            const semVidas = vidas.every(
                vida => vida.getAttribute('src') == imagens.coracaoVazio
            );

            if (semVidas) {
                alert('voce perdeu');
                location.reload();
            }
        }
    });

    tabuleiro.appendChild(celula);
}
    </script>
    <input type="button" value="Reiniciar" onclick="location.reload()">
</body>
</html>
